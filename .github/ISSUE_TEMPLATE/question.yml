name: ❓ Question
description: Ask a question about ContextLens
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Have a question? We're happy to help!
        For general discussion, consider using GitHub Discussions instead.

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
    validations:
      required: true

  - type: dropdown
    id: topic
    attributes:
      label: Topic
      options:
        - Installation / Setup
        - MCP Configuration
        - Tool Usage
        - Architecture
        - Contributing
        - Other

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any relevant context, screenshots, or code snippets.
