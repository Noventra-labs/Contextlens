name: Dependency Audit

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 9 * * 1'  # Weekly Monday 9am UTC

jobs:
  audit-backend:
    name: Backend npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=high
        continue-on-error: false

  audit-extension:
    name: Extension npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vscode-extension/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
        continue-on-error: false

  audit-dashboard:
    name: Dashboard npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contextlens-dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: contextlens-dashboard/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
        continue-on-error: false
