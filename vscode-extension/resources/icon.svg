<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <rect width="128" height="128" rx="22" fill="#0D1117"/>
  <!-- Lens circle -->
  <circle cx="64" cy="58" r="34" fill="none" stroke="#4ECDC4" stroke-width="3.5"/>
  <!-- Lens inner subtle ring -->
  <circle cx="64" cy="58" r="27" fill="none" stroke="#4ECDC4" stroke-width="1" opacity="0.25"/>
  <!-- Tree root node -->
  <circle cx="64" cy="50" r="4" fill="#4ECDC4"/>
  <!-- Branch lines -->
  <line x1="64" y1="54" x2="50" y2="64" stroke="#4ECDC4" stroke-width="2" stroke-linecap="round"/>
  <line x1="64" y1="54" x2="64" y2="66" stroke="#4ECDC4" stroke-width="2" stroke-linecap="round"/>
  <line x1="64" y1="54" x2="78" y2="64" stroke="#4ECDC4" stroke-width="2" stroke-linecap="round"/>
  <!-- Leaf nodes -->
  <circle cx="50" cy="66" r="3.5" fill="#4ECDC4" opacity="0.85"/>
  <circle cx="64" cy="68" r="3.5" fill="#4ECDC4"/>
  <circle cx="78" cy="66" r="3.5" fill="#4ECDC4" opacity="0.85"/>
  <!-- Focus cross at bottom of lens -->
  <line x1="64" y1="93" x2="64" y2="102" stroke="#4ECDC4" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Lens handle -->
  <line x1="88" y1="85" x2="97" y2="94" stroke="#4ECDC4" stroke-width="3.5" stroke-linecap="round"/>
</svg>